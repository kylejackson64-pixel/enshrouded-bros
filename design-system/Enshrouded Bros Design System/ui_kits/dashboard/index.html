<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Enshrouded Bros · Dashboard</title>
  <link rel="icon" href="../../assets/favicon.svg">
  <link rel="stylesheet" href="../../colors_and_type.css">
  <style>
    html, body { margin:0; padding:0; background:var(--abyss); min-height:100vh; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background: var(--bg-atmosphere); pointer-events: none; z-index: 0;
    }
    main { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 0 1.5rem 3rem; }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 currentColor; opacity: 1; }
      50% { box-shadow: 0 0 0 6px rgba(92,184,92,0); opacity: .85; }
    }
    @keyframes flame { 0%,100%{transform:scale(1);opacity:.95} 50%{transform:scale(1.08);opacity:1} }
    button { font-family: inherit }
    a { color: var(--gold) }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="Tokens.jsx"></script>
  <script type="text/babel" src="Header.jsx"></script>
  <script type="text/babel" src="LiveStatus.jsx"></script>
  <script type="text/babel" src="U8Banner.jsx"></script>
  <script type="text/babel" src="FlameAltar.jsx"></script>
  <script type="text/babel" src="Party.jsx"></script>
  <script type="text/babel" src="BossGuide.jsx"></script>
  <script type="text/babel" src="SessionNotes.jsx"></script>
  <script type="text/babel" src="Footer.jsx"></script>

  <script type="text/babel">
    function App() {
      return (
        <main>
          <Header />
          <LiveStatus />
          <U8Banner />
          <FlameAltar />
          <Party />
          <BossGuide />
          <SessionNotes />
          <Footer />
        </main>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
