<!doctype html>
<html><head><meta charset="utf-8">
<title>Progress Bars</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--abyss);color:var(--text);min-height:100%}
  body::before{content:'';position:fixed;inset:0;background:var(--bg-atmosphere);pointer-events:none;z-index:0}
  .wrap{position:relative;z-index:1;padding:22px 28px;display:flex;flex-direction:column;gap:14px}
  .row{display:flex;flex-direction:column;gap:5px}
  .top{display:flex;justify-content:space-between;align-items:baseline}
  .lbl{font-family:var(--font-serif);font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-light)}
  .val{font-family:var(--font-serif);font-weight:600;color:var(--gold);font-size:.85rem}
  .track{height:8px;background:rgba(255,255,255,.07);border-radius:4px;overflow:hidden}
  .fill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.34,1.56,.64,1)}
  .ember{background:linear-gradient(90deg,#9c3a12,#ff8c42)}
  .water{background:linear-gradient(90deg,#2a6a9a,#4a9fd4)}
  .gold-f{background:linear-gradient(90deg,#b88a2e,#f0c96a)}
  .purple-f{background:linear-gradient(90deg,#6a4a94,#a89bd4)}
</style>
</head><body>
<div class="wrap">
  <div class="row"><div class="top"><span class="lbl">🔥 Flame Altar Progress</span><span class="val" style="color:#ff8c42">71%</span></div><div class="track"><div class="fill ember" style="width:71%"></div></div></div>
  <div class="row"><div class="top"><span class="lbl">💧 Water Aura Meter</span><span class="val" style="color:#4a9fd4">88%</span></div><div class="track"><div class="fill water" style="width:88%"></div></div></div>
  <div class="row"><div class="top"><span class="lbl">⚔️ Party Level · Overall</span><span class="val">45 / 60</span></div><div class="track"><div class="fill gold-f" style="width:75%"></div></div></div>
  <div class="row"><div class="top"><span class="lbl">🔮 Weapon Ultimate</span><span class="val" style="color:#a89bd4">42%</span></div><div class="track"><div class="fill purple-f" style="width:42%"></div></div></div>
</div>
</body></html>
