<!doctype html>
<html><head><meta charset="utf-8">
<title>Iconography · Emoji Set</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--abyss);color:var(--text);min-height:100%}
  body::before{content:'';position:fixed;inset:0;background:var(--bg-atmosphere);pointer-events:none;z-index:0}
  .wrap{position:relative;z-index:1;padding:20px 24px;display:grid;grid-template-columns:repeat(8,1fr);gap:8px}
  .i{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:10px 4px;text-align:center}
  .gl{font-size:1.5rem;line-height:1;margin-bottom:5px}
  .nm{font-family:var(--font-serif);font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim)}
</style>
</head><body>
<div class="wrap">
  <div class="i"><div class="gl">🔥</div><div class="nm">Altar</div></div>
  <div class="i"><div class="gl">🏹</div><div class="nm">Ranger</div></div>
  <div class="i"><div class="gl">⚔️</div><div class="nm">Barb</div></div>
  <div class="i"><div class="gl">🔮</div><div class="nm">Wizard</div></div>
  <div class="i"><div class="gl">💧</div><div class="nm">Healer</div></div>
  <div class="i"><div class="gl">🛡️</div><div class="nm">Gear</div></div>
  <div class="i"><div class="gl">🌟</div><div class="nm">Skill</div></div>
  <div class="i"><div class="gl">🌐</div><div class="nm">Share</div></div>
  <div class="i"><div class="gl">📡</div><div class="nm">Server</div></div>
  <div class="i"><div class="gl">💀</div><div class="nm">Boss</div></div>
  <div class="i"><div class="gl">🗺</div><div class="nm">Biome</div></div>
  <div class="i"><div class="gl">🧑‍🤝‍🧑</div><div class="nm">Party</div></div>
  <div class="i"><div class="gl">🔨</div><div class="nm">Craft</div></div>
  <div class="i"><div class="gl">📖</div><div class="nm">Guide</div></div>
  <div class="i"><div class="gl">📝</div><div class="nm">Notes</div></div>
  <div class="i"><div class="gl">💎</div><div class="nm">Loot</div></div>
  <div class="i"><div class="gl">⚒</div><div class="nm">U8</div></div>
  <div class="i"><div class="gl">⚙️</div><div class="nm">Setup</div></div>
  <div class="i"><div class="gl">🪵</div><div class="nm">Rack</div></div>
  <div class="i"><div class="gl">💾</div><div class="nm">Hash</div></div>
  <div class="i"><div class="gl" style="color:#5cb85c">✓</div><div class="nm">Done</div></div>
  <div class="i"><div class="gl" style="color:#f0c96a">⚠</div><div class="nm">Pending</div></div>
  <div class="i"><div class="gl" style="color:#c0392b">✗</div><div class="nm">Missing</div></div>
  <div class="i"><div class="gl" style="color:#8a9bb0">▸</div><div class="nm">Bullet</div></div>
</div>
</body></html>
